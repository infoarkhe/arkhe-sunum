<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="preconnect" href="https://vdo.ninja">
<title>Enerjimetre Kontrol</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, sans-serif;
    background: #ffffff;
    color: #333;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: #111;
    color: #fff;
    font-size: 13px;
  }
  .top-bar .timer { color: #00b4d8; font-weight: 600; }
  .top-bar .timer.warn { color: #f0ad4e; }
  .top-bar .timer.danger { color: #e63946; }
  .top-bar .back-btn {
    background: none;
    border: 1px solid #555;
    color: #fff;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }
  .top-bar .page-title {
    font-weight: 500;
    flex: 1;
    text-align: center;
  }
  .stream {
    height: 35vh;
    background: #000;
    position: relative;
  }
  .stream iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  .stream-label {
    position: absolute;
    top: 8px;
    left: 12px;
    color: #e63946;
    font-size: 13px;
    font-weight: 600;
    animation: blink 1.5s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .controls {
    padding: 12px;
    background: #f8f8f8;
    border-top: 1px solid #eee;
    flex: 1;
    overflow-y: auto;
  }
  .btn-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .btn {
    background: #fff;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    padding: 8px;
    font-size: 13px;
    font-weight: 500;
    color: #333;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 52px;
  }
  .btn:active {
    background: #00b4d8;
    color: #fff;
    border-color: #00b4d8;
    transform: scale(0.95);
  }
  .btn.active {
    background: #00b4d8;
    color: #fff;
    border-color: #00b4d8;
  }
  .btn.back {
    background: #f0f0f0;
    border-color: #ccc;
    color: #666;
    grid-column: span 3;
    min-height: 40px;
  }
  .status {
    text-align: center;
    padding: 6px;
    font-size: 11px;
    color: #999;
  }
</style>
</head>
<body>

<div class="top-bar">
  <span class="timer" id="timer">⏱ --</span>
  <span class="page-title" id="pageTitle">Ana Ekran</span>
  <button class="back-btn" onclick="backToTelegram()">← Telegram</button>
</div>

<div class="stream">
  <div class="stream-label">● CANLI</div>
  <iframe src="https://vdo.ninja/?view=arkhesunum&room=azad&solo&cover&transparent&autostart&noaudio"
    allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<div class="controls">
  <div class="btn-grid" id="btnGrid"></div>
</div>

<div class="status" id="status">Hazır</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.ready();

  const BOT_TOKEN = "8157710360:AAH0gG6KcYzMwYgrboU4v9hjhV_kJchZF4o";
  const STATUS = document.getElementById('status');
  const TIMER = document.getElementById('timer');
  const GRID = document.getElementById('btnGrid');
  const TITLE = document.getElementById('pageTitle');

  // Menu tree — bot ile aynı yapı
  const MENU = {
    "1": {
      title: "Ana Ekran", dwin: 1,
      buttons: [
        {text: "Güç Göstergesi", target: "5"},
        {text: "CO₂ Göstergesi", target: "6"},
        {text: "Çizgi Grafik", target: "7"},
        {text: "Bar Grafik", target: "11"},
        {text: "Günlük Rapor", target: "24"},
        {text: "Saat Ayarları", target: "65"},
        {text: "Tarih Ayarları", target: "63"},
        {text: "Ayarlar", target: "40"}
      ]
    },
    "5": {
      title: "Güç Göstergesi", dwin: 5,
      buttons: [{text: "← Geri", target: "1"}, {text: "Güç Büyük", target: "15"}]
    },
    "15": {
      title: "Güç Büyük", dwin: 15,
      buttons: [{text: "← Geri", target: "5"}]
    },
    "6": {
      title: "CO₂ Göstergesi", dwin: 6,
      buttons: [{text: "← Geri", target: "1"}, {text: "CO₂ Büyük", target: "16"}]
    },
    "16": {
      title: "CO₂ Büyük", dwin: 16,
      buttons: [{text: "← Geri", target: "6"}]
    },
    "7": {
      title: "Çizgi Grafik", dwin: 7,
      buttons: [{text: "← Geri", target: "1"}]
    },
    "11": {
      title: "Bar Grafik", dwin: 11,
      buttons: [{text: "← Geri", target: "1"}]
    },
    "24": {
      title: "Günlük Rapor", dwin: 24,
      buttons: [{text: "← Geri", target: "1"}]
    },
    "40": {
      title: "Ayarlar", dwin: 40,
      buttons: [
        {text: "← Geri", target: "1"},
        {text: "Maks. kW", target: "41"},
        {text: "CO₂ Katsayı", target: "44"},
        {text: "Parlaklık", target: "47"},
        {text: "Saat ve Tarih", target: "60"},
        {text: "Tarife Saatleri", target: "88"},
        {text: "Ön Tanımlı Değerler", target: "50"},
        {text: "RS485", target: "79"},
        {text: "Alarm Ayarları", target: "89"}
      ]
    },
    "41": {title: "Maks. kW Ayarı", dwin: 41, buttons: [{text: "← Geri", target: "40"}]},
    "44": {title: "CO₂ Katsayısı", dwin: 44, buttons: [{text: "← Geri", target: "40"}]},
    "47": {title: "Parlaklık", dwin: 47, buttons: [{text: "← Geri", target: "40"}]},
    "88": {title: "Tarife Saatleri", dwin: 88, buttons: [{text: "← Geri", target: "40"}]},
    "60": {
      title: "Saat ve Tarih", dwin: 60,
      buttons: [{text: "← Geri", target: "40"}, {text: "Saat", target: "65"}, {text: "Tarih", target: "63"}]
    },
    "65": {title: "Saat Ayarları", dwin: 65, buttons: [{text: "← Geri", target: "60"}]},
    "63": {title: "Tarih Ayarları", dwin: 63, buttons: [{text: "← Geri", target: "60"}]},
    "50": {
      title: "Ön Tanımlı Değerler", dwin: 50,
      buttons: [{text: "← Geri", target: "40"}, {text: "Süre Ayarı", target: "51"}]
    },
    "51": {title: "Süre Ayarı", dwin: 51, buttons: [{text: "← Geri", target: "50"}]},
    "79": {
      title: "RS485 Ayarları", dwin: 79,
      buttons: [{text: "← Geri", target: "40"}, {text: "Cihaz", target: "70"}, {text: "Adres", target: "81"}]
    },
    "70": {title: "RS485 Cihaz", dwin: 70, buttons: [{text: "← Geri", target: "79"}]},
    "81": {
      title: "RS485 Adres", dwin: 81,
      buttons: [{text: "← Geri", target: "79"}, {text: "Manuel Giriş", target: "73"}]
    },
    "73": {title: "Manuel Adres", dwin: 73, buttons: [{text: "← Geri", target: "81"}]},
    "89": {
      title: "Alarm Ayarları", dwin: 89,
      buttons: [
        {text: "← Geri", target: "40"},
        {text: "Hazır Saat", target: "91"},
        {text: "Özel Saat", target: "92"},
        {text: "Sonraki →", target: "90"}
      ]
    },
    "90": {
      title: "Alarm Ayarları (2)", dwin: 90,
      buttons: [{text: "← Önceki", target: "89"}, {text: "Enerji", target: "93"}, {text: "Güç", target: "94"}]
    },
    "91": {title: "Hazır Saat Alarmları", dwin: 91, buttons: [{text: "← Geri", target: "89"}]},
    "92": {title: "Özel Saat Alarmları", dwin: 92, buttons: [{text: "← Geri", target: "89"}]},
    "93": {title: "Enerji Alarmları", dwin: 93, buttons: [{text: "← Geri", target: "90"}]},
    "94": {title: "Güç Alarmları", dwin: 94, buttons: [{text: "← Geri", target: "90"}]}
  };

  let currentPage = "1";

  // URL'den timeout al
  const params = new URLSearchParams(window.location.search);
  let timeLeft = parseInt(params.get('timeout')) || 60;

  function updateTimer() {
    if (timeLeft <= 15) { TIMER.className = 'timer danger'; TIMER.textContent = `🔴 ${timeLeft} sn`; }
    else if (timeLeft <= 30) { TIMER.className = 'timer warn'; TIMER.textContent = `🟡 ${timeLeft} sn`; }
    else { TIMER.className = 'timer'; TIMER.textContent = `⏱ ${timeLeft} sn`; }
  }

  updateTimer();
  setInterval(() => {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) tg.close();
  }, 1000);

  function renderPage(pageKey) {
    const page = MENU[pageKey];
    if (!page) return;
    currentPage = pageKey;
    TITLE.textContent = page.title;
    GRID.innerHTML = '';
    page.buttons.forEach(btn => {
      const el = document.createElement('div');
      el.className = 'btn' + (btn.text.includes('←') || btn.text.includes('→') ? ' back' : '');
      el.textContent = btn.text;
      el.onclick = () => go(btn.target);
      GRID.appendChild(el);
    });
  }

  function backToTelegram() { tg.close(); }

  function go(targetKey) {
    const page = MENU[targetKey];
    if (!page) return;

    // DWIN komutu gönder (fire & forget)
    const userId = tg.initDataUnsafe?.user?.id;
    if (userId) {
      fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: userId, text: `/go ${page.dwin}` })
      }).then(r => r.json()).then(data => {
        const msgId = data.result?.message_id;
        if (msgId) {
          fetch(`https://api.telegram.org/bot${BOT_TOKEN}/pinChatMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: userId, message_id: msgId, disable_notification: true })
          });
        }
      });
      timeLeft = 60;
      updateTimer();
    }

    renderPage(targetKey);
    STATUS.textContent = `${page.title} ✓`;
    setTimeout(() => { STATUS.textContent = 'Hazır'; }, 1500);
  }

  // İlk ekran
  renderPage("1");
</script>
</body>
</html>
