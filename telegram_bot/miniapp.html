<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Enerjimetre Kontrol</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, sans-serif;
    background: #ffffff;
    color: #333;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: #111;
    color: #fff;
    font-size: 13px;
  }
  .top-bar .timer { color: #00b4d8; font-weight: 600; }
  .top-bar .timer.warn { color: #f0ad4e; }
  .top-bar .timer.danger { color: #e63946; }
  .top-bar .back-btn {
    background: none;
    border: 1px solid #555;
    color: #fff;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }

  .stream {
    height: 35vh;
    background: #000;
    position: relative;
  }
  .stream iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  .stream-label {
    position: absolute;
    top: 8px;
    left: 12px;
    color: #e63946;
    font-size: 13px;
    font-weight: 600;
    animation: blink 1.5s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .controls {
    padding: 12px;
    background: #f8f8f8;
    border-top: 1px solid #eee;
    flex: 1;
  }
  .controls h3 {
    font-size: 13px;
    color: #999;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .btn-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .btn {
    background: #fff;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    padding: 14px 8px;
    font-size: 13px;
    font-weight: 500;
    color: #333;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .btn:active {
    background: #00b4d8;
    color: #fff;
    border-color: #00b4d8;
    transform: scale(0.95);
  }
  .btn.active {
    background: #00b4d8;
    color: #fff;
    border-color: #00b4d8;
  }
  .status {
    text-align: center;
    padding: 8px;
    font-size: 12px;
    color: #999;
  }
</style>
</head>
<body>

<div class="top-bar">
  <span class="timer" id="timer">⏱ --</span>
  <button class="back-btn" onclick="backToTelegram()">← Telegram'a Dön</button>
</div>

<div class="stream">
  <div class="stream-label">● CANLI</div>
  <iframe loading="lazy" src="https://vdo.ninja/?view=arkhesunum&room=azad&solo&cover&transparent&autostart&noaudio&quality=0&bitrate=500"
    allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<div class="controls">
  <h3>Cihazı Kontrol Et</h3>
  <div class="btn-grid">
    <div class="btn" onclick="go(1)">Ana Ekran</div>
    <div class="btn" onclick="go(5)">Güç Kadran</div>
    <div class="btn" onclick="go(15)">Güç Büyük</div>
    <div class="btn" onclick="go(6)">CO₂</div>
    <div class="btn" onclick="go(11)">Bar Grafik</div>
    <div class="btn" onclick="go(24)">Günlük Rapor</div>
    <div class="btn" onclick="go(89)">Alarmlar</div>
    <div class="btn" onclick="go(79)">RS485</div>
    <div class="btn" onclick="go(65)">Ayarlar</div>
  </div>
</div>

<div class="status" id="status">Hazır</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.ready();

  const BOT_TOKEN = "8157710360:AAH0gG6KcYzMwYgrboU4v9hjhV_kJchZF4o";
  const STATUS = document.getElementById('status');
  const TIMER = document.getElementById('timer');

  // URL'den timeout al
  const params = new URLSearchParams(window.location.search);
  let timeLeft = parseInt(params.get('timeout')) || 60;

  // Geri sayım
  function updateTimer() {
    if (timeLeft <= 15) {
      TIMER.className = 'timer danger';
      TIMER.textContent = `🔴 ${timeLeft} sn`;
    } else if (timeLeft <= 30) {
      TIMER.className = 'timer warn';
      TIMER.textContent = `🟡 ${timeLeft} sn`;
    } else {
      TIMER.className = 'timer';
      TIMER.textContent = `⏱ ${timeLeft} sn`;
    }
  }

  updateTimer();
  const countdown = setInterval(() => {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) {
      clearInterval(countdown);
      STATUS.textContent = '⏰ Süre doldu';
      tg.close();
    }
  }, 1000);

  function backToTelegram() {
    tg.close();
  }

  async function go(pageId) {
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    STATUS.textContent = 'Gönderiliyor...';

    const userId = tg.initDataUnsafe?.user?.id;
    if (userId) {
      // Fire & forget — await yok, anında devam et
      fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: userId, text: `/go ${pageId}` })
      }).then(r => r.json()).then(data => {
        const msgId = data.result?.message_id;
        if (msgId) {
          fetch(`https://api.telegram.org/bot${BOT_TOKEN}/pinChatMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: userId, message_id: msgId, disable_notification: true })
          });
        }
      });

      timeLeft = 60;
      updateTimer();
    }
    STATUS.textContent = `Sayfa ${pageId} ✓`;

    setTimeout(() => { STATUS.textContent = 'Hazır'; }, 2000);
  }
</script>
</body>
</html>
