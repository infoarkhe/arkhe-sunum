<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Enerjimetre — Canlı Yayın</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, sans-serif;
    background: #000;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .stream {
    flex: 1;
    position: relative;
  }
  .stream iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  .stream-label {
    position: absolute;
    top: 12px;
    left: 16px;
    color: #e63946;
    font-size: 14px;
    font-weight: 600;
    animation: blink 1.5s infinite;
    z-index: 10;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .bar {
    padding: 14px 20px;
    background: #111;
    display: flex;
    justify-content: center;
  }
  .bar button {
    background: #00b4d8;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px 32px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    max-width: 400px;
  }
  .bar button:active {
    opacity: 0.8;
    transform: scale(0.97);
  }
</style>
</head>
<body>

<div class="stream">
  <div class="stream-label">● CANLI</div>
  <iframe
    src="https://vdo.ninja/?view=arkhesunum&room=azad&solo&cover&transparent&autostart&noaudio"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>
</div>

<div class="bar">
  <button onclick="backToTelegram()">← Telegram'a Dön</button>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.ready();

  function backToTelegram() {
    tg.close();
  }
</script>
</body>
</html>
